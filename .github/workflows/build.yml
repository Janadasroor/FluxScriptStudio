name: Build and Test Android APK

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Fetch FluxScript 0.1.0 Binaries
        run: |
          mkdir -p app/src/main/cpp/include
          mkdir -p app/src/main/cpp/lib/arm64-v8a
          mkdir -p app/src/main/cpp/lib/x86_64
          
          # 1. Handle x86_64 (For CI Emulators)
          curl -L https://github.com/Janadasroor/fluxscript/releases/download/v0.1.0/fluxscript-android-x86_64.tar.gz -o flux-x86_64.tar.gz
          mkdir -p temp_x86_64
          tar -xzf flux-x86_64.tar.gz -C temp_x86_64
          echo "Structure of x86_64 archive:"
          ls -R temp_x86_64
          
          # Use find to locate and copy files regardless of structure
          find temp_x86_64 -name "*.so" -exec cp {} app/src/main/cpp/lib/x86_64/ \;
          find temp_x86_64 -name "*.h" -exec cp {} app/src/main/cpp/include/ \;
          
          # 2. Handle arm64-v8a (For Physical Devices)
          ARM64_URL="https://github.com/Janadasroor/fluxscript/releases/download/v0.1.0/fluxscript-android-arm64.tar.gz"
          if curl --output /dev/null --silent --head --fail "$ARM64_URL"; then
            curl -L "$ARM64_URL" -o flux-arm64.tar.gz
            mkdir -p temp_arm64
            tar -xzf flux-arm64.tar.gz -C temp_arm64
            find temp_arm64 -name "*.so" -exec cp {} app/src/main/cpp/lib/arm64-v8a/ \;
          else
            echo "Warning: arm64 binary not found at $ARM64_URL"
          fi

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run Unit Tests
        run: ./gradlew testDebugUnitTest

      - name: Publish Unit Test Report
        uses: mikepenz/action-junit-report@v4
        if: always()
        with:
          report_paths: '**/build/test-results/testDebugUnitTest/*.xml'
          check_name: "Unit Test Report"

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/*.apk

  instrumented:
    runs-on: ubuntu-latest
    needs: build

    strategy:
      matrix:
        api-level: [34]
        target: [google_apis]

    steps:
      - uses: actions/checkout@v4

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules && sudo udevadm trigger --name-match=kvm

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Fetch FluxScript 0.1.0 Binaries
        run: |
          mkdir -p app/src/main/cpp/include
          mkdir -p app/src/main/cpp/lib/x86_64
          curl -L https://github.com/Janadasroor/fluxscript/releases/download/v0.1.0/fluxscript-android-x86_64.tar.gz -o flux-x86_64.tar.gz
          mkdir -p temp_x86_64
          tar -xzf flux-x86_64.tar.gz -C temp_x86_64
          find temp_x86_64 -name "*.so" -exec cp {} app/src/main/cpp/lib/x86_64/ \;
          find temp_x86_64 -name "*.h" -exec cp {} app/src/main/cpp/include/ \;

      - name: Run Flux Code Validation
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          target: ${{ matrix.target }}
          arch: x86_64
          avd-name: ci-test
          emulator-options: -no-window -no-snapshot -noaudio -no-boot-anim
          disable-animations: true
          script: ./gradlew connectedDebugAndroidTest

      - name: Publish Flux Validation Report
        uses: mikepenz/action-junit-report@v4
        if: always()
        with:
          report_paths: '**/build/outputs/androidTest-results/connected/*.xml'
          check_name: "Flux Validation Report"

      - name: Upload Logs and Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: flux-test-results
          path: |
            app/build/reports/androidTests/connected/
